apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{.Release.Name}}-dest-rule
  namespace: {{.Release.Namespace}}
  labels:
    {{- include "chart.labels" . | indent 4}}
spec:
  host: {{ include "ledger-chart.vs.host" . }}
  subsets:
  - name: v1
    labels:
      version: {{.Values.app.version}}
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL